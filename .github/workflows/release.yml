name: Release

# Go modules are consumed directly from VCS tags — "publishing" is pushing a
# vX.Y.Z tag. This workflow validates the tag, warms the module proxy, and cuts
# a GitHub release. No registry credentials are needed.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
      - name: Warm the module proxy
        run: GOPROXY=https://proxy.golang.org go list -m "github.com/bulutklinik/go-sdk@${GITHUB_REF_NAME}" || true
      - uses: softprops/action-gh-release@v2
